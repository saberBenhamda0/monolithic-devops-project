apiVersion: batch/v1
kind: CronJob
metadata:
  name: loki-log-exporter
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "loki-log-exporter"
            vault.hashicorp.com/agent-inject-secret-aws: "secret/data/loki-log-exporter/aws"
            vault.hashicorp.com/agent-inject-template-aws: |
              {{- with secret "secret/data/backend-manga2you" -}}
              export AWS_ACCESS_KEY_ID="{{ .Data.data.AWS_ACCESS_KEY_ID }}"
              export AWS_SECRET_ACCESS_KEY="{{ .Data.data.AWS_SECRET_ACCESS_KEY }}"
              export AWS_DEFAULT_REGION="{{ .Data.data.AWS_DEFAULT_REGION }}"
              {{- end }}
        spec:
          serviceAccountName: loki-log-exporter-sa
          initContainers:
          - name: export-logs
            image: grafana/logcli:latest
            env:
            - name: LOKI_ADDR
              value: "http://loki-stack.monitoring.svc.cluster.local:3100"
            command:
            - /bin/sh
            - -c
            - |
              DATE=$(date -u -d @$(($(date -u +%s) - 604800)) +%Y-%m-%d)
              logcli query '{namespace="prod"}' \
                --from="${DATE}T00:00:00Z" \
                --to="${DATE}T23:59:59Z" \
                --output=jsonl | gzip > /shared/logs-${DATE}.jsonl.gz
            volumeMounts:
            - name: shared-data
              mountPath: /shared
          containers:
          - name: upload-to-s3
            image: amazon/aws-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              source /vault/secrets/aws
              DATE=$(date -u -d @$(($(date -u +%s) - 604800)) +%Y-%m-%d)
              aws s3 cp /shared/logs-${DATE}.jsonl.gz \
                s3://manga2you-kubernetes-prod-logs/logs/date=${DATE}/
            volumeMounts:
            - name: shared-data
              mountPath: /shared
          volumes:
          - name: shared-data
            emptyDir: {}
          restartPolicy: OnFailure