resources:
- ../../base
- namespace.yaml
- ../../metrics-server
- ./job
- hpa.yaml
- canary-service.yaml
- canary-ingress.yaml
- canary-rollout.yaml
- canary-validation-analysis-template.yaml
namespace: prod
namePrefix: prod-
nameSuffix: -v1
patches:
- patch: |-
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend-manga2you
  target:
    kind: Deployment
    name: backend-manga2you
- path: ingress.yaml
  target:
    kind: Ingress
    name: backend-manga2you
- patch: |-
    $patch: delete
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: backend-manga2you-hpa
  target:
    kind: HorizontalPodAutoscaler
    name: backend-manga2you-hpa
    
configMapGenerator:
- envs:
  - config.properties
  name: backend-manga2you-env-variables
  options:
    disableNameSuffixHash: true
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
