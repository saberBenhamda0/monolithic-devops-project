resources:
- ../../base
- namespace.yaml
- ../../metrics-server
- ./job
- ingress.yaml
- canary-service.yaml
- canary-ingress.yaml
- canary-rollout.yaml
- canary-validation-analysis-template.yaml
namespace: prod
namePrefix: prod-
nameSuffix: -v1
patches:
- patch: |-
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend-manga2you
  target:
    kind: Deployment
    name: backend-manga2you

- patch: |-
    - op: replace
      path: /spec/scaleTargetRef/apiVersion
      value: argoproj.io/v1alpha1
    - op: replace
      path: /spec/scaleTargetRef/kind
      value: Rollout
    - op: replace
      path: /spec/scaleTargetRef/name
      value: prod-backend-manga2you-v1
    - op: replace
      path: /spec/maxReplicas
      value: 3
    - op: replace
      path: /spec/minReplicas
      value: 1
  target: 
    kind: HorizontalPodAutoscaler
    name: backend-manga2you-hpa


- path: ingress.yaml
  target:
    kind: Ingress
    name: backend-manga2you
    
configMapGenerator:
- envs:
  - config.properties
  name: backend-manga2you-env-variables
  options:
    disableNameSuffixHash: true
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
