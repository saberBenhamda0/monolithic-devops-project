apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-manga2you
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: myapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-manga2you
                port:
                  number: 9632