apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  sources:
    # Source 1 — Helm chart from Hashicorp registry
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: "0.32.0"
      helm:
        valueFiles:
          - $values/vault/vault-values.yaml

    # Source 2 — Git repo, ONLY used to resolve $values (deploys nothing)
    - repoURL: https://github.com/saberBenhamda0/monolithic-devops-project.git
      targetRevision: HEAD
      ref: values

    # Source 3 — Git repo, deploy the ConfigMap from the vault folder
    - repoURL: https://github.com/saberBenhamda0/monolithic-devops-project.git
      targetRevision: HEAD
      path: vault

  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true