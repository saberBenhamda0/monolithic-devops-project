apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: "1.21.1"   # vault version
      helm:
        valueFiles:
          - $vault/vault/vault-values.yaml

    - repoURL: https://github.com/saberBenhamda0/monolithic-devops-project.git
      targetRevision: HEAD
      ref: values   # this is what $values refers to above
      path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true