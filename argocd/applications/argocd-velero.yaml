apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  sources:
    # 1️⃣ Helm chart
    - repoURL: https://vmware-tanzu.github.io/helm-charts
      chart: velero
      targetRevision: "11.4.0"
      helm:
        valueFiles:
          - $values/velero/values.yaml
    # 2️⃣ Values repo
    - repoURL: https://github.com/saberBenhamda0/monolithic-devops-project
      targetRevision: main
      ref: values
      path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true